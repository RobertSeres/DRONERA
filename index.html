<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRONERA — Az Új Korszak</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=tanker@400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #0D0D0D;
      color: #FAFAF8;
      font-family: "DM Sans", sans-serif;
      overflow-x: hidden;
      cursor: none;
    }
    body::after {
      content:''; position:fixed; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity:0.022; pointer-events:none; z-index:99998;
    }
    #cursor-dot {
      width:8px; height:8px; background:white; border-radius:50%;
      position:fixed; top:0; left:0; pointer-events:none; z-index:99999;
      mix-blend-mode:difference; transition:width 0.25s, height 0.25s;
    }
    #cursor-ring {
      width:36px; height:36px; border:1px solid rgba(255,255,255,0.7); border-radius:50%;
      position:fixed; top:0; left:0; pointer-events:none; z-index:99997;
      mix-blend-mode:difference;
      transition:width 0.35s cubic-bezier(0.23,1,0.32,1), height 0.35s cubic-bezier(0.23,1,0.32,1), opacity 0.3s;
    }
    body.cursor-hover #cursor-ring { width:64px; height:64px; }
    @keyframes marquee {
      from { transform:translateX(0); }
      to   { transform:translateX(-50%); }
    }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-track { background:#0D0D0D; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.18); }
    ::selection { background:#FAFAF8; color:#0D0D0D; }
    @media (max-width: 768px) {
      .mobile-menu-btn { display:flex !important; }
      .desktop-nav { display:none !important; }
    }
    @media (max-width: 860px) {
      .contact-grid { grid-template-columns:1fr !important; }
      .footer-grid  { grid-template-columns:1fr 1fr !important; }
    }
    @media (max-width: 600px) {
      .footer-grid { grid-template-columns:1fr !important; }
    }
  </style>
</head>
<body class="">
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>
  <div id="root"></div>

  <script type="text/babel" src="Navbar.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="ServicesSection.jsx"></script>
  <script type="text/babel" src="ServicePage.jsx"></script>
  <script type="text/babel" src="ContactPage.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
